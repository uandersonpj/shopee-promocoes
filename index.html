<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Promoções | Shopee + Mercado Livre</title>
<meta name="description" content="Promoções atualizadas em tempo real de Shopee e Mercado Livre com links de afiliado.">
<style>
:root {
  --bg: #0f0f13;
  --card: #1a1a22;
  --card2: #22222d;
  --border: #2a2a38;
  --text: #e8e8f0;
  --muted: #8888a0;
  --orange: #ff5522;
  --ml-yellow: #ffe600;
  --green: #22c55e;
  --sidebar-w: 230px;
  --header-h: 60px;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

/* ── HEADER ── */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: var(--header-h);
  background: linear-gradient(135deg,#1a0a00,#0a0a1a);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; padding: 0 16px;
}
.hamburger {
  background: none; border: none; cursor: pointer; color: var(--text);
  display: flex; flex-direction: column; gap: 5px; padding: 6px; flex-shrink: 0;
}
.hamburger span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; transition: all .3s; }
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.logo { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.logo h1 { font-size: 1.1rem; font-weight: 700; white-space: nowrap; }
.logo .sp { color: var(--orange); }
.logo .ml { color: var(--ml-yellow); }
.search-wrap { flex: 1; max-width: 480px; }
#searchInput {
  width: 100%; padding: 9px 16px; background: var(--card2);
  border: 1px solid var(--border); border-radius: 24px;
  color: var(--text); font-size: .9rem; outline: none; transition: border .2s;
}
#searchInput:focus { border-color: var(--orange); }
#searchInput::placeholder { color: var(--muted); }
.header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.src-btn {
  padding: 6px 12px; border-radius: 20px; border: 1.5px solid var(--border);
  background: transparent; color: var(--muted); font-size: .78rem; font-weight: 700;
  cursor: pointer; transition: all .2s; white-space: nowrap;
}
.src-btn:hover { border-color: var(--orange); color: var(--text); }
.src-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }
.src-btn.ml-active { background: var(--ml-yellow) !important; border-color: var(--ml-yellow) !important; color: #000 !important; }
#sortSelect {
  background: var(--card); border: 1px solid var(--border); color: var(--text);
  border-radius: 8px; padding: 5px 8px; font-size: .78rem; cursor: pointer;
}

/* ── OVERLAY ── */
#overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
  z-index: 150; backdrop-filter: blur(2px);
}
#overlay.show { display: block; }

/* ── SIDEBAR ── */
#sidebar {
  position: fixed; top: var(--header-h); left: 0; bottom: 0;
  width: var(--sidebar-w); background: var(--card);
  border-right: 1px solid var(--border); z-index: 160;
  transform: translateX(-100%); transition: transform .3s ease;
  overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  display: flex; flex-direction: column;
}
#sidebar.open { transform: translateX(0); }
.sidebar-head {
  padding: 14px 16px 10px; font-size: .7rem; font-weight: 800;
  text-transform: uppercase; letter-spacing: .1em; color: var(--muted);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.sidebar-section { padding: 8px 0; border-bottom: 1px solid var(--border); }
.sidebar-section-title {
  padding: 6px 16px; font-size: .68rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em; color: var(--muted);
}
.cat-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px; cursor: pointer; font-size: .84rem; color: var(--muted);
  transition: background .15s, color .15s; border: none; background: none;
  width: 100%; text-align: left;
}
.cat-item:hover { background: var(--card2); color: var(--text); }
.cat-item.active { background: rgba(255,85,34,.12); color: var(--orange); font-weight: 600; }
.cat-item .cat-count {
  margin-left: auto; font-size: .7rem; background: var(--card2);
  padding: 2px 7px; border-radius: 10px; color: var(--muted);
}
.cat-item.active .cat-count { background: rgba(255,85,34,.2); color: var(--orange); }
.sidebar-footer {
  margin-top: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
}
.join-btn-s {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  border-radius: 10px; font-weight: 700; font-size: .82rem; text-decoration: none;
  transition: opacity .15s;
}
.join-btn-s:hover { opacity: .88; }
.btn-wpp-s { background: #25D366; color: #fff; }
.btn-tg-s  { background: #2AABEE; color: #fff; }

/* ── STATS BAR ── */
.statsbar {
  position: fixed; top: var(--header-h); left: 0; right: 0; z-index: 100;
  background: var(--card2); border-bottom: 1px solid var(--border);
  padding: 6px 16px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
}
.stat { font-size: .75rem; color: var(--muted); white-space: nowrap; }
.stat strong { color: var(--text); }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; animation: pulse 2s infinite; margin-right: 5px; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

/* ── MAIN CONTENT ── */
.main {
  margin-top: calc(var(--header-h) + 34px);
  padding: 20px 16px; max-width: 1400px; margin-left: auto; margin-right: auto;
}

/* ── GRID ── */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 14px; }

/* ── CARDS ── */
.card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; display: flex; flex-direction: column;
  transition: transform .2s, box-shadow .2s;
}
.card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
.card.ml-card { border-color: rgba(255,230,0,.15); }
.card.ml-card:hover { box-shadow: 0 4px 24px rgba(255,230,0,.12); }
.card-img { position: relative; aspect-ratio: 1; overflow: hidden; background: #111; }
.card-img img { width:100%;height:100%;object-fit:contain;padding:8px;transition:transform .3s; }
.card:hover .card-img img { transform: scale(1.05); }
.badge { position:absolute;top:8px;left:8px;padding:3px 8px;border-radius:6px;font-size:.72rem;font-weight:800; }
.badge-shopee { background:var(--orange);color:#fff; }
.badge-ml     { background:var(--ml-yellow);color:#000; }
.src-badge { position:absolute;top:8px;right:8px;padding:2px 7px;border-radius:6px;font-size:.62rem;font-weight:700;opacity:.9; }
.src-shopee { background:var(--orange);color:#fff; }
.src-ml     { background:var(--ml-yellow);color:#000; }
.commission-tag { position:absolute;bottom:8px;left:8px;padding:2px 7px;border-radius:6px;font-size:.62rem;font-weight:800;background:#7c3aed;color:#fff; }
.card-body { padding:10px;flex:1;display:flex;flex-direction:column;gap:5px; }
.card-name { font-size:.8rem;line-height:1.4;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
.card-prices { display:flex;align-items:baseline;gap:6px;flex-wrap:wrap; }
.price-now { font-size:1rem;font-weight:700;color:var(--green); }
.price-was { font-size:.75rem;color:var(--muted);text-decoration:line-through; }
.card-meta { font-size:.7rem;color:var(--muted);display:flex;gap:6px;flex-wrap:wrap; }
.card-shop { font-size:.7rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
.card-footer { padding:0 10px 10px; }
.btn-buy {
  display:block;width:100%;padding:8px 0;border-radius:8px;text-align:center;
  font-size:.82rem;font-weight:700;text-decoration:none;border:none;cursor:pointer;
  transition:opacity .15s,transform .1s;
}
.btn-buy:hover { opacity:.88;transform:scale(.98); }
.btn-shopee { background:var(--orange);color:#fff; }
.btn-ml     { background:var(--ml-yellow);color:#000; }

/* ── SKELETON ── */
.skeleton { background:var(--card);border-radius:var(--radius);overflow:hidden; }
.sk-img { aspect-ratio:1; }
.sk-body { padding:10px;display:flex;flex-direction:column;gap:7px; }
.sk-line { border-radius:4px;height:11px; }
.sk-line.sm { width:60%; }
.sk-btn { border-radius:8px;height:32px;margin:0 10px 10px; }
@keyframes shimmer{0%{background-position:-500px 0}100%{background-position:500px 0}}
.sk-img,.sk-line,.sk-btn{background-image:linear-gradient(90deg,var(--card2) 25%,var(--border) 50%,var(--card2) 75%);background-size:1000px 100%;animation:shimmer 1.8s infinite linear;}

/* ── EMPTY ── */
.empty { text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1; }
.empty .icon { font-size:2.5rem;margin-bottom:12px; }

/* ── TOP BTN ── */
#topBtn { position:fixed;bottom:20px;right:20px;width:42px;height:42px;border-radius:50%;background:var(--orange);color:#fff;border:none;cursor:pointer;font-size:1.1rem;display:none;z-index:300;box-shadow:var(--shadow); }

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .logo h1 { font-size:.9rem; }
  .header-right { display:none; }
  .grid { grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px; }
  .statsbar { gap:10px; }
  .stat:nth-child(n+4) { display:none; }
}
</style>
</head>

<script>
const DATA_URL = 'produtos.json';
const REFRESH_MS = 15 * 60 * 1000;

let allProducts = [];
let activeSource = 'all';
let activeCategory = 'all';
let searchQ = '';
let sortBy = 'discount';

const NICHE_ICONS = {
  'organizador':'🗂️','tapete':'🏠','luminaria':'💡','abajur':'🪔','quadro decorativo':'🖼️',
  'porta retrato':'🖼️','suporte organizador':'📦','prateleira':'🪵','cesto organizador':'🧺',
  'vela aromatica':'🕯️','espelho decorativo':'🪞','manta sofa':'🛋️','almofada decorativa':'🛋️',
  'cortina':'🪟','fralda':'👶','carrinho bebe':'🍼','berco':'🛏️','mamadeira':'🍼',
  'chupeta':'👶','body bebe':'👕','cadeira amamentacao':'🪑','banheira bebe':'🛁',
  'kit higiene bebe':'🧴','monitor bebe':'📱','shampoo':'🧴','condicionador':'🧴',
  'protetor solar':'☀️','creme facial':'✨','perfume':'🌸','mascara cabelo':'💆',
  'serum facial':'✨','hidratante corporal':'🧴','whey protein':'💪','creatina':'💪',
  'haltere':'🏋️','elastico musculacao':'🏋️','coqueteleira':'🥤','racao cachorro':'🐶',
  'racao gato':'🐱','casinha pet':'🏠','coleira':'🦮','arranhador gato':'🐱',
  'air fryer':'🍳','cafeteira':'☕','liquidificador':'🥤','panela pressao':'🍲',
  'frigideira':'🍳','notebook':'💻','ssd nvme':'💾','monitor':'🖥️','mouse gamer':'🖱️',
  'teclado mecanico':'⌨️','fone bluetooth':'🎧','carregador rapido':'⚡','cabo usb':'🔌',

  'sabao em po':'🧺','amaciante':'🌸','detergente':'🧽','desinfetante':'🧹',
  'esponja':'🧽','pano microfibra':'🧹','roteador wifi':'📶','fonte atx':'⚡',
  'placa de video':'🎮','smartphone':'📱','televisao':'📺','tenis':'👟','whey protein':'💪',
  'cadeira gamer':'🎮','relogio smartwatch':'⌚','aspirador':'🧹','geladeira':'❄️',
  'micro-ondas':'📦','ventilador':'💨','mochila':'🎒','camera':'📷','tablet':'📱',
  'impressora':'🖨️',
  'vara de pesca':'🎣','carretilha pesca':'🎣','molinete pesca':'🎣','linha de pesca':'🎣',
  'anzol':'🪝','isca artificial':'🎣','isca pesca':'🎣','salva vidas pesca':'🦺',
  'colete salva vidas':'🦺','boné pesca':'🧢','caixa de pesca':'🎣','vara telescopica':'🎣',
  'kit pesca':'🎣','chumbada':'⚓','flutuador pesca':'🎣','rede de pesca':'🎣',
  'ecopesca':'🐟','suporte vara pesca':'🎣','estojo pesca':'🎣','luva pesca':'🧤',
};

function getIcon(cat) { return NICHE_ICONS[cat] || '🏷️'; }

function fmt(n) {
  return Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function buildCard(p) {
  const isML = p.source === 'mercadolivre';
  const disc = Math.round(p.discount || 0);
  const hasComm = p.commission >= 3;
  const badge = disc > 0 ? `<div class="badge ${isML?'badge-ml':'badge-shopee'}">${disc}% OFF</div>` : '';
  const src = `<div class="src-badge ${isML?'src-ml':'src-shopee'}">${isML?'🟡 ML':'🟠 Shopee'}</div>`;
  const commTag = hasComm ? `<div class="commission-tag">💎 COMISSÃO EXTRA</div>` : '';
  const orig = (p.original_price && p.original_price > p.price)
    ? `<span class="price-was">R$ ${fmt(p.original_price)}</span>` : '';
  const img = p.image
    ? `<img src="${p.image}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<div style=display:flex;align-items:center;justify-content:center;height:100%;font-size:3rem>🛍️</div>'">`
    : `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:3rem">🛍️</div>`;
  return `<div class="card ${isML?'ml-card':''}">
    <div class="card-img">${img}${badge}${src}${commTag}</div>
    <div class="card-body">
      <div class="card-name">${p.name||''}</div>
      <div class="card-prices"><span class="price-now">R$ ${fmt(p.price)}</span>${orig}</div>
      <div class="card-meta">${p.rating?'<span>⭐ '+Number(p.rating).toFixed(1)+'</span>':''}${p.sales?'<span>🛒 '+p.sales+'</span>':''}</div>
      ${p.shop?`<div class="card-shop">🏬 ${p.shop}</div>`:''}
    </div>
    <div class="card-footer">
      <a href="${p.link||'#'}" target="_blank" rel="noopener" class="btn-buy ${isML?'btn-ml':'btn-shopee'}">${isML?'🛍️ Comprar no Mercado Livre':'🛒 Comprar na Shopee'}</a>
    </div>
  </div>`;
}

function skeleton() {
  return `<div class="skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line"></div><div class="sk-line sm"></div><div class="sk-line sm"></div></div><div class="sk-btn"></div></div>`;
}

function buildCatList(products) {
  const counts = {};
  products.forEach(p => { if(p.category) counts[p.category] = (counts[p.category]||0)+1; });
  const cats = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const list = document.getElementById('catList');
  list.innerHTML = '';
  cats.forEach(([cat, count]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-item' + (activeCategory===cat?' active':'');
    btn.dataset.cat = cat;
    btn.innerHTML = `${getIcon(cat)} ${cat} <span class="cat-count">${count}</span>`;
    btn.addEventListener('click', () => {
      activeCategory = (activeCategory===cat) ? 'all' : cat;
      document.querySelectorAll('.cat-item[data-cat]').forEach(b=>b.classList.remove('active'));
      if (activeCategory!=='all') btn.classList.add('active');
      render();
      closeSidebar();
    });
    list.appendChild(btn);
  });
}

function render() {
  let list = allProducts;
  if (activeSource !== 'all') list = list.filter(p=>p.source===activeSource);
  if (activeCategory !== 'all') list = list.filter(p=>p.category===activeCategory);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.category||'').toLowerCase().includes(q)||(p.shop||'').toLowerCase().includes(q));
  }
  list = [...list];
  if (sortBy==='discount') list.sort((a,b)=>(b.discount||0)-(a.discount||0));
  else if (sortBy==='price_asc') list.sort((a,b)=>a.price-b.price);
  else if (sortBy==='price_desc') list.sort((a,b)=>b.price-a.price);
  else if (sortBy==='rating') list.sort((a,b)=>(b.rating||0)-(a.rating||0));
  const grid = document.getElementById('grid');
  grid.innerHTML = list.length
    ? list.map(buildCard).join('')
    : `<div class="empty"><div class="icon">🔍</div><p>Nenhum produto encontrado.</p></div>`;
}

async function load() {
  const grid = document.getElementById('grid');
  if (!allProducts.length) grid.innerHTML = Array(12).fill(skeleton()).join('');
  try {
    const resp = await fetch(DATA_URL+'?t='+Date.now());
    if (!resp.ok) throw new Error('HTTP '+resp.status);
    const data = await resp.json();
    allProducts = data.products||[];
    const shopeeN = allProducts.filter(p=>p.source==='shopee').length;
    const mlN = allProducts.filter(p=>p.source==='mercadolivre').length;
    const maxDisc = allProducts.length ? Math.round(Math.max(...allProducts.map(p=>p.discount||0))) : 0;
    const upd = data.updated_at ? new Date(data.updated_at).toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit'}) : '—';
    document.getElementById('statTotal').textContent = allProducts.length;
    document.getElementById('statShopee').textContent = shopeeN;
    document.getElementById('statML').textContent = mlN;
    document.getElementById('statDisc').textContent = maxDisc;
    document.getElementById('statTime').textContent = upd;
    document.getElementById('cnt-all').textContent = allProducts.length;
    document.getElementById('cnt-shopee').textContent = shopeeN;
    document.getElementById('cnt-ml').textContent = mlN;
    buildCatList(allProducts);
    render();
  } catch(e) {
    console.error(e);
    if (!allProducts.length)
      grid.innerHTML = `<div class="empty"><div class="icon">😕</div><p>Erro ao carregar. Aguarde o próximo ciclo.</p></div>`;
  }
}

// Sidebar toggle
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('hamburger').classList.remove('open');
}
document.getElementById('hamburger').addEventListener('click', () => {
  const open = document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show', open);
  document.getElementById('hamburger').classList.toggle('open', open);
});
document.getElementById('overlay').addEventListener('click', closeSidebar);

// Source filter (header)
document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(b=>b.classList.remove('active','ml-active'));
    btn.classList.add('active');
    if (btn.dataset.filter==='mercadolivre') btn.classList.add('ml-active');
    activeSource = btn.dataset.filter;
    activeCategory = 'all';
    document.querySelectorAll('.cat-item[data-cat]').forEach(b=>b.classList.remove('active'));
    render();
    closeSidebar();
  });
});

// Sort (header)
document.getElementById('sortSelect').addEventListener('change', e => { sortBy=e.target.value; render(); });

// Sort (sidebar mobile)
document.querySelectorAll('.sort-item').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-item').forEach(b=>b.classList.remove('active-sort'));
    btn.classList.add('active-sort');
    sortBy = btn.dataset.sort;
    document.getElementById('sortSelect').value = sortBy;
    render();
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', e => { searchQ=e.target.value.trim(); render(); });

// Scroll top btn
window.addEventListener('scroll', () => { document.getElementById('topBtn').style.display=window.scrollY>400?'block':'none'; });

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
